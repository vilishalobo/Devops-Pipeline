name: Build and Push Image

on:
  push:
    branches: [ "main" ]

# 1. Give the robot permission to save packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log in to GitHub's Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and Push the image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This names your image: ghcr.io/your-username/devops-pipeline-2026:latest
          tags: ghcr.io/${{ github.repository_owner }}/devops-pipeline-2026:latest
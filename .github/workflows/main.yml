name: Build My App

# 1. When should this run?
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. What kind of computer should GitHub provide?
    runs-on: ubuntu-latest

    steps:
    # 3. Pull the code from the repo onto the GitHub computer
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Try to build the Docker image to make sure the code isn't broken
    - name: Build Docker Image
      run: docker build -t my-devops-app:latest .
      
    - name: Verify Success
      run: echo "The image built successfully!"